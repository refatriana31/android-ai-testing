<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAT Dashboard — Bawana Revamp Mobile</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --border: #475569;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,.12);
    --yellow: #eab308;
    --yellow-bg: rgba(234,179,8,.12);
    --blue: #3b82f6;
    --blue-bg: rgba(59,130,246,.12);
    --purple: #a855f7;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
  .container { max-width:1280px; margin:0 auto; padding:24px 20px; }

  /* Header */
  .header { text-align:center; margin-bottom:40px; }
  .header h1 { font-size:28px; font-weight:700; margin-bottom:4px; }
  .header .subtitle { color:var(--text2); font-size:14px; }
  .header .meta-badges { display:flex; gap:12px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
  .meta-badge { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:8px 16px; font-size:13px; color:var(--text2); }
  .meta-badge strong { color:var(--text); }

  /* Summary Cards */
  .summary-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap:16px; margin-bottom:32px; }
  .summary-card { background:var(--surface); border-radius:12px; padding:24px; text-align:center; border:1px solid var(--border); }
  .summary-card .number { font-size:42px; font-weight:800; line-height:1; }
  .summary-card .label { font-size:13px; color:var(--text2); margin-top:8px; text-transform:uppercase; letter-spacing:.5px; }
  .summary-card.passed .number { color:var(--green); }
  .summary-card.failed .number { color:var(--red); }
  .summary-card.skipped .number { color:var(--yellow); }
  .summary-card.total .number { color:var(--blue); }
  .summary-card.rate .number { color:var(--purple); }

  /* Progress bar */
  .progress-section { margin-bottom:32px; }
  .progress-bar-container { background:var(--surface2); border-radius:8px; height:32px; overflow:hidden; display:flex; }
  .progress-bar-container .seg { height:100%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; transition:width .5s; }
  .seg.passed { background:var(--green); color:#000; }
  .seg.failed { background:var(--red); color:#fff; }
  .seg.skipped { background:var(--yellow); color:#000; }
  .seg.not-started { background:var(--surface); color:var(--text2); }
  .progress-legend { display:flex; gap:24px; margin-top:12px; justify-content:center; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text2); }
  .legend-dot { width:12px; height:12px; border-radius:3px; }

  /* Section breakdown */
  .section-title { font-size:20px; font-weight:700; margin-bottom:16px; }
  .section-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(340px,1fr)); gap:16px; margin-bottom:32px; }
  .section-card { background:var(--surface); border-radius:12px; padding:20px; border:1px solid var(--border); }
  .section-card .sec-name { font-size:15px; font-weight:600; margin-bottom:12px; }
  .section-card .sec-bar { height:8px; border-radius:4px; background:var(--surface2); overflow:hidden; display:flex; margin-bottom:8px; }
  .section-card .sec-bar .seg { height:100%; }
  .section-card .sec-stats { display:flex; gap:12px; font-size:12px; color:var(--text2); }
  .sec-stat { display:flex; align-items:center; gap:4px; }
  .sec-stat .dot { width:8px; height:8px; border-radius:2px; display:inline-block; }

  /* Tabs */
  .tabs { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .tab-btn { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:8px 18px; font-size:13px; color:var(--text2); cursor:pointer; transition:all .2s; }
  .tab-btn:hover { border-color:var(--blue); color:var(--text); }
  .tab-btn.active { background:var(--blue); border-color:var(--blue); color:#fff; }

  /* Table */
  .table-wrap { overflow-x:auto; margin-bottom:32px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { background:var(--surface2); padding:12px 16px; text-align:left; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; font-size:11px; position:sticky; top:0; }
  tbody td { padding:10px 16px; border-bottom:1px solid var(--border); }
  tbody tr:hover { background:rgba(255,255,255,.03); }
  .status-badge { display:inline-block; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:600; text-transform:uppercase; }
  .status-badge.passed { background:var(--green-bg); color:var(--green); }
  .status-badge.failed { background:var(--red-bg); color:var(--red); }
  .status-badge.skipped { background:var(--yellow-bg); color:var(--yellow); }
  .status-badge.not-started { background:var(--blue-bg); color:var(--blue); }
  .priority-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:500; }
  .priority-badge.high { background:rgba(239,68,68,.15); color:var(--red); }
  .priority-badge.medium { background:rgba(234,179,8,.15); color:var(--yellow); }
  .priority-badge.low { background:rgba(34,197,94,.15); color:var(--green); }

  /* Blocker breakdown */
  .blocker-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap:16px; margin-bottom:32px; }
  .blocker-card { background:var(--surface); border-radius:12px; padding:20px; border:1px solid var(--border); }
  .blocker-card .bc-title { font-size:14px; font-weight:600; margin-bottom:4px; }
  .blocker-card .bc-count { font-size:28px; font-weight:800; color:var(--yellow); margin-bottom:8px; }
  .blocker-card .bc-desc { font-size:12px; color:var(--text2); }
  .blocker-card .bc-examples { font-size:11px; color:var(--text2); margin-top:8px; font-family:monospace; }

  /* Run history */
  .run-card { background:var(--surface); border-radius:12px; padding:20px; border:1px solid var(--border); margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
  .run-info { display:flex; flex-direction:column; gap:2px; }
  .run-id { font-weight:600; font-size:15px; }
  .run-meta { font-size:12px; color:var(--text2); }
  .run-stats { display:flex; gap:16px; }

  /* Device info */
  .device-card { background:var(--surface); border-radius:12px; padding:24px; border:1px solid var(--border); margin-bottom:32px; display:grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap:16px; }
  .device-item .di-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
  .device-item .di-value { font-size:15px; font-weight:600; margin-top:2px; }

  /* Search */
  .search-box { width:100%; padding:10px 16px; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; margin-bottom:16px; outline:none; }
  .search-box:focus { border-color:var(--blue); }
  .search-box::placeholder { color:var(--text2); }

  /* Footer */
  .footer { text-align:center; padding:32px 0 16px; color:var(--text2); font-size:12px; border-top:1px solid var(--border); margin-top:40px; }

  @media (max-width:600px) {
    .summary-grid { grid-template-columns:repeat(2,1fr); }
    .section-grid, .blocker-grid { grid-template-columns:1fr; }
    .summary-card .number { font-size:32px; }
  }
</style>
</head>

<script>
(async function(){
  // Data will be injected by build script
  const DATA = window.__DASHBOARD_DATA__;
  if (!DATA) { document.getElementById('app').innerHTML = '<p>Loading data...</p>'; return; }

  const { runs, total_catalog, tests, catalog, section_map } = DATA;

  // Compute final status per catalog row (merge test results)
  const testById = {};
  tests.forEach(t => { testById[t.id] = t; });

  // Map catalog UAT IDs to test file IDs
  const uatToTest = {};
  tests.forEach(t => {
    // Read scenario_file to extract possible UAT match
    uatToTest[t.id] = t;
  });

  // Compute stats
  const passed = tests.filter(t => t.status === 'passed').length;
  const failed = tests.filter(t => t.status === 'failed').length;
  const skipped = tests.filter(t => t.status === 'skipped').length;
  const total = catalog.length;
  const notStarted = total - passed - failed - skipped;
  const passRate = total > 0 ? ((passed / (passed + failed)) * 100).toFixed(1) : '0';

  // Section breakdown
  const sections = {};
  catalog.forEach(row => {
    const sec = row['Section'] || 'Unknown';
    if (!sections[sec]) sections[sec] = { total:0, passed:0, failed:0, skipped:0, notStarted:0, items:[] };
    sections[sec].total++;
    const st = (row['Status'] || '').toLowerCase().replace(/\s+/g,'-');
    if (st === 'passed') sections[sec].passed++;
    else if (st === 'failed') sections[sec].failed++;
    else if (st === 'skipped') sections[sec].skipped++;
    else sections[sec].notStarted++;
    sections[sec].items.push(row);
  });

  // Blocker categories
  const blockers = [
    { title: 'Admin-seeded Content', count: 30, desc: 'Quiz, video, audio, PDF, SCORM, events, prerequisite courses', examples: 'LIB-M-012, FLOW-M-001, CON-M-001, EVT-M-002' },
    { title: 'Different Account Needed', count: 15, desc: 'Manager account, second learner, disposable account, fresh account', examples: 'TEAM-M-001..008, ASG-M-007, HOME-M-009' },
    { title: 'External Channel', count: 9, desc: 'Email inbox, SSO IdP, 2FA OTP, push notifications', examples: 'AUTH-M-005/006, SEC-M-003, AUTH-M-003' },
    { title: 'Infrastructure Beyond MCP', count: 5, desc: 'Network toggle, clock advance, orientation automation', examples: 'AUTH-M-010, FLOW-M-012, LIB-M-020' },
    { title: 'Account State Mutation', count: 5, desc: 'Would mutate state; needs disposable account', examples: 'INT-M-002, INT-M-006, PRO-M-004/006' },
    { title: 'Source Lost', count: 1, desc: 'Original QA sheet row corrupted', examples: 'ASG-M-006' },
  ];

  // Build HTML
  let html = '';

  // Header
  html += `
  <div class="header">
    <h1>UAT Test Dashboard</h1>
    <div class="subtitle">Bawana Revamp — PermataBank Mobile LMS</div>
    <div class="meta-badges">
      <div class="meta-badge"><strong>APK:</strong>&nbsp;v${runs[0]?.apk?.version_name || '1.0.0'} (build ${runs[0]?.apk?.version_code || '22'})</div>
      <div class="meta-badge"><strong>Package:</strong>&nbsp;${runs[0]?.apk?.package || 'com.example.bawana_revamp'}</div>
      <div class="meta-badge"><strong>Environment:</strong>&nbsp;permata-revamp-stg</div>
      <div class="meta-badge"><strong>Last Run:</strong>&nbsp;${runs[runs.length-1]?.run_id || 'N/A'}</div>
    </div>
  </div>`;

  // Summary Cards
  html += `
  <div class="summary-grid">
    <div class="summary-card total"><div class="number">${total}</div><div class="label">Total Scenarios</div></div>
    <div class="summary-card passed"><div class="number">${passed}</div><div class="label">Passed</div></div>
    <div class="summary-card skipped"><div class="number">${skipped}</div><div class="label">Skipped</div></div>
    <div class="summary-card failed"><div class="number">${failed}</div><div class="label">Failed</div></div>
    <div class="summary-card rate"><div class="number">${passRate}%</div><div class="label">Pass Rate (excl. skipped)</div></div>
  </div>`;

  // Progress Bar
  const pP = (passed/total*100).toFixed(1);
  const pF = (failed/total*100).toFixed(1);
  const pS = (skipped/total*100).toFixed(1);
  const pN = (notStarted/total*100).toFixed(1);
  html += `
  <div class="progress-section">
    <div class="progress-bar-container">
      <div class="seg passed" style="width:${pP}%">${passed > 0 ? passed : ''}</div>
      <div class="seg failed" style="width:${pF}%">${failed > 0 ? failed : ''}</div>
      <div class="seg skipped" style="width:${pS}%">${skipped > 0 ? skipped : ''}</div>
      ${notStarted > 0 ? `<div class="seg not-started" style="width:${pN}%">${notStarted}</div>` : ''}
    </div>
    <div class="progress-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Passed (${passed})</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Failed (${failed})</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div> Skipped (${skipped})</div>
      ${notStarted > 0 ? `<div class="legend-item"><div class="legend-dot" style="background:var(--surface2)"></div> Not Started (${notStarted})</div>` : ''}
    </div>
  </div>`;

  // Device Info
  const dev = runs[0]?.device || {};
  html += `
  <h2 class="section-title">Device Under Test</h2>
  <div class="device-card">
    <div class="device-item"><div class="di-label">Brand / Model</div><div class="di-value">${dev.brand || 'N/A'} ${dev.model || ''}</div></div>
    <div class="device-item"><div class="di-label">Android Version</div><div class="di-value">${dev.android_version || 'N/A'} (SDK ${dev.sdk || ''})</div></div>
    <div class="device-item"><div class="di-label">Screen</div><div class="di-value">${dev.screen_size || 'N/A'} @ ${dev.density || ''}dpi</div></div>
    <div class="device-item"><div class="di-label">Build</div><div class="di-value">${dev.build || 'N/A'}</div></div>
    <div class="device-item"><div class="di-label">Serial</div><div class="di-value">${dev.serial || 'N/A'}</div></div>
    <div class="device-item"><div class="di-label">Tester</div><div class="di-value">Refa Triana (AI-assisted)</div></div>
  </div>`;

  // Section Breakdown
  html += `<h2 class="section-title">Coverage by Module</h2><div class="section-grid">`;
  Object.keys(sections).sort().forEach(sec => {
    const s = sections[sec];
    const pPct = (s.passed/s.total*100).toFixed(0);
    const fPct = (s.failed/s.total*100).toFixed(0);
    const sPct = (s.skipped/s.total*100).toFixed(0);
    const nPct = (s.notStarted/s.total*100).toFixed(0);
    html += `
    <div class="section-card">
      <div class="sec-name">${sec}</div>
      <div class="sec-bar">
        <div class="seg passed" style="width:${pPct}%"></div>
        <div class="seg failed" style="width:${fPct}%"></div>
        <div class="seg skipped" style="width:${sPct}%"></div>
        ${s.notStarted > 0 ? `<div class="seg not-started" style="width:${nPct}%"></div>` : ''}
      </div>
      <div class="sec-stats">
        <div class="sec-stat"><span class="dot" style="background:var(--green)"></span> ${s.passed}P</div>
        ${s.failed > 0 ? `<div class="sec-stat"><span class="dot" style="background:var(--red)"></span> ${s.failed}F</div>` : ''}
        ${s.skipped > 0 ? `<div class="sec-stat"><span class="dot" style="background:var(--yellow)"></span> ${s.skipped}S</div>` : ''}
        ${s.notStarted > 0 ? `<div class="sec-stat"><span class="dot" style="background:var(--text2)"></span> ${s.notStarted}NS</div>` : ''}
        <div class="sec-stat" style="margin-left:auto; font-weight:600; color:var(--text);">${s.total} total</div>
      </div>
    </div>`;
  });
  html += `</div>`;

  // Blocker Breakdown
  html += `<h2 class="section-title">Why 80 Scenarios Are Skipped</h2><div class="blocker-grid">`;
  blockers.forEach(b => {
    html += `
    <div class="blocker-card">
      <div class="bc-title">${b.title}</div>
      <div class="bc-count">~${b.count}</div>
      <div class="bc-desc">${b.desc}</div>
      <div class="bc-examples">${b.examples}</div>
    </div>`;
  });
  html += `</div>`;

  // Run History
  html += `<h2 class="section-title">Test Run History</h2>`;
  const runSummaries = [
    { id: '2026-04-15_21-11-12', tests: 41, desc: 'Initial batch — 35 High-priority + 6 smoke/nav scenarios' },
    { id: '2026-04-16_00-56-51', tests: 99, desc: 'Full batch — 17 High + 73 Medium + 9 Low scenarios' },
    { id: '2026-04-16_01-21-48-retry', tests: 12, desc: 'Retry sweep — 12 skipped scenarios with vision fallback (all passed)' },
    { id: '2026-04-16_10-57-45', tests: 1, desc: 'Re-test AUTH-M-007 (change password with revert) — previously failed, now passed' },
  ];
  runSummaries.forEach(r => {
    html += `
    <div class="run-card">
      <div class="run-info">
        <div class="run-id">${r.id}</div>
        <div class="run-meta">${r.desc}</div>
      </div>
      <div class="run-stats">
        <div class="meta-badge"><strong>${r.tests}</strong>&nbsp;scenarios</div>
      </div>
    </div>`;
  });

  // Detailed Test Results Table
  html += `
  <h2 class="section-title" style="margin-top:32px">Detailed Test Results</h2>
  <input type="text" class="search-box" id="searchInput" placeholder="Search by UAT ID, scenario name, section, or status...">
  <div class="tabs" id="filterTabs">
    <button class="tab-btn active" data-filter="all">All (${total})</button>
    <button class="tab-btn" data-filter="passed">Passed (${passed})</button>
    <button class="tab-btn" data-filter="skipped">Skipped (${skipped})</button>
    <button class="tab-btn" data-filter="failed">Failed (${failed})</button>
    ${notStarted > 0 ? `<button class="tab-btn" data-filter="not-started">Not Started (${notStarted})</button>` : ''}
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>UAT ID</th>
          <th>Section</th>
          <th>Priority</th>
          <th>Scenario</th>
          <th>Status</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody id="resultsBody">`;

  catalog.forEach((row, i) => {
    const st = (row['Status'] || 'Not Started').toLowerCase().replace(/\s+/g, '-');
    const pri = (row['Priority'] || '').toLowerCase();
    const notes = row['Actual Result'] || row['Notes'] || '';
    const truncNotes = notes.length > 120 ? notes.substring(0, 120) + '...' : notes;
    html += `
        <tr class="result-row" data-status="${st}" data-search="${(row['UAT ID'] + ' ' + row['Scenario'] + ' ' + row['Section'] + ' ' + st).toLowerCase()}">
          <td>${i+1}</td>
          <td><strong>${row['UAT ID'] || ''}</strong></td>
          <td>${row['Section'] || ''}</td>
          <td>${pri ? `<span class="priority-badge ${pri}">${row['Priority']}</span>` : ''}</td>
          <td>${row['Scenario'] || ''}</td>
          <td><span class="status-badge ${st}">${row['Status'] || 'Not Started'}</span></td>
          <td style="max-width:300px;font-size:11px;color:var(--text2)">${truncNotes}</td>
        </tr>`;
  });

  html += `</tbody></table></div>`;

  // Action Items
  html += `
  <h2 class="section-title">Recommended Next Steps</h2>
  <div class="blocker-grid">
    <div class="blocker-card" style="border-color:var(--red)">
      <div class="bc-title" style="color:var(--red)">1. Fix Failed Scenario</div>
      <div class="bc-desc" style="margin-top:8px">
        <strong>02-navigation</strong> — Navigation assertion fails on pre-login site-name screen.
        The test expects element text changes after tap, but the site-name screen only has an EditText and a Next button (no-op without input).
        <br><br>Consider adjusting the test to start navigation assertions from the post-login homepage instead.
      </div>
    </div>
    <div class="blocker-card" style="border-color:var(--yellow)">
      <div class="bc-title" style="color:var(--yellow)">2. Seed Test Content (unblocks ~30)</div>
      <div class="bc-desc" style="margin-top:8px">
        Admin needs to create: quiz (essay + MCQ), video/audio/PDF content, events, prerequisite-chained courses, and scored post-tests in the learner's catalog.
      </div>
    </div>
    <div class="blocker-card" style="border-color:var(--blue)">
      <div class="bc-title" style="color:var(--blue)">3. Provide Manager Account (unblocks 7)</div>
      <div class="bc-desc" style="margin-top:8px">
        All Team Activity View scenarios (TEAM-M-001 through TEAM-M-008) require a manager-role credential.
      </div>
    </div>
    <div class="blocker-card" style="border-color:var(--purple)">
      <div class="bc-title" style="color:var(--purple)">4. Disposable Learner Account (unblocks ~15)</div>
      <div class="bc-desc" style="margin-top:8px">
        Scenarios that mutate account state (likes, bookmarks, profile edits, lockout) plus cross-learner visibility tests.
      </div>
    </div>
  </div>`;

  // Footer
  html += `
  <div class="footer">
    Generated on ${new Date().toISOString().split('T')[0]} &middot; Automated UAT by Claude AI + mobile-mcp &middot; Bawana Revamp v1.0.0<br>
    Tester: Refa Triana &middot; Device: ${dev.brand} ${dev.model} (Android ${dev.android_version})
  </div>`;

  document.getElementById('app').innerHTML = html;

  // Filter logic
  const tabs = document.querySelectorAll('.tab-btn');
  const rows = document.querySelectorAll('.result-row');
  const searchInput = document.getElementById('searchInput');

  function applyFilters() {
    const activeFilter = document.querySelector('.tab-btn.active').dataset.filter;
    const searchTerm = searchInput.value.toLowerCase();
    rows.forEach(row => {
      const matchStatus = activeFilter === 'all' || row.dataset.status === activeFilter;
      const matchSearch = !searchTerm || row.dataset.search.includes(searchTerm);
      row.style.display = (matchStatus && matchSearch) ? '' : 'none';
    });
  }

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      applyFilters();
    });
  });

  searchInput.addEventListener('input', applyFilters);
})();
</script>
</body>
